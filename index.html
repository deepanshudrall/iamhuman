  <style>
    *{
      margin:0;

    }

      --fb:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    }

      background:var(--bg);

<body>

<div id="app"></div>

<div class="modal" id="modal">
  <div class="modal-content">

    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-tag" id="modalTag"></div>

    <div class="section">
      <div class="section-label">What did you do today?</div>
      <textarea id="note"></textarea>
    </div>

    <div class="section">
      <div class="section-label">How well did you show up?</div>
      <div class="stars" id="stars"></div>
    </div>

    <button class="save" onclick="saveArea()">Save</button>

  </div>
</div>

<script>
const AREAS = [
{
  id:'physical',
  name:'Physical Health',
  emoji:'🏃',
  accent:'#C1440E',
  tag:'Move your body. Fuel it well.'
},
{
  id:'mental',
  name:'Mental Health',
  emoji:'🧠',
  accent:'#0F6E56',
  tag:'A calm mind is your greatest asset.'
},
{
  id:'relationships',
  name:'Relationships',
  emoji:'❤️',
  accent:'#993556',
  tag:'Connection is the antidote.'
},
{
  id:'career',
  name:'Career',
  emoji:'💼',
  accent:'#854F0B',
  tag:'Work with purpose.'
},
{
  id:'financial',
  name:'Financial',
  emoji:'💰',
  accent:'#3B6D11',
  tag:'Security buys freedom.'
},
{
  id:'growth',
  name:'Growth',
  emoji:'📚',
  accent:'#185FA5',
  tag:'Improve a little daily.'
},
{
  id:'spiritual',
  name:'Spiritual',
  emoji:'✨',
  accent:'#534AB7',
  tag:'Be still. Connect.'
},
{
  id:'community',
  name:'Community',
  emoji:'🤝',
  accent:'#993C1D',
  tag:'Belong somewhere.'
}
];

const QUOTES = [
'You are human. Rest, connect, grow.',
'Small intentional moments build great days.',
'You do not need perfection. Just presence.',
'Take care of yourself before the world asks things from you.'
];

let selected = null;
let rating = 3;

const today = new Date().toDateString();

let logs = JSON.parse(localStorage.getItem(today) || '{}');

function render(){

  const done = Object.keys(logs).length;
  const pct = Math.round(done / AREAS.length * 100);

  document.getElementById('app').innerHTML = `
  
  <div class="header">

    <div class="header-top">

      <div>
        <div class="app-title">I am human 🌿</div>
        <div class="date">${new Date().toDateString()}</div>
      </div>

      <button class="stats-btn">${done}/8</button>

    </div>

    <div class="quote">
      ${QUOTES[Math.floor(Math.random() * QUOTES.length)]}
    </div>

  </div>

  <div class="score">

    <svg width="56" height="56">

      <circle
        cx="28"
        cy="28"
        r="22"
        stroke="#EDE8E0"
        stroke-width="5"
        fill="none"
      />

      <circle
        cx="28"
        cy="28"
        r="22"
        stroke="#C1440E"
        stroke-width="5"
        fill="none"
        stroke-linecap="round"
        transform="rotate(-90 28 28)"
        stroke-dasharray="${2*Math.PI*22}"
        stroke-dashoffset="${2*Math.PI*22*(1-pct/100)}"
      />

    </svg>

    <div>

      <div class="score-big">
        ${done}<span class="score-small">/8</span>
      </div>

      <div class="score-small">
        areas checked in today
      </div>

      <div class="progress">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>

    </div>

  </div>

  ${
    done === 8
    ? `<div class="perfect">🎉 Perfect human day.</div>`
    : ''
  }

  <div class="grid">

    ${AREAS.map(area => `

      <div
        class="card ${logs[area.id] ? 'done' : ''}"
        onclick="openArea('${area.id}')"
      >

        <div
          class="card-stripe"
          style="background:${area.accent}"
        ></div>

        <div class="card-emoji">${area.emoji}</div>

        <div class="card-title">${area.name}</div>

        <div class="card-tag">${area.tag}</div>

        <div class="check">
          ${logs[area.id] ? '✓' : ''}
        </div>

      </div>

    `).join('')}

  </div>

  <div class="footer">
    Works fully offline · Data saved locally
  </div>
  `;
}

function openArea(id){

  selected = AREAS.find(a => a.id === id);

  document.getElementById('modal')
    .classList.add('active');

  document.getElementById('modalTitle')
    .textContent = selected.name;

  document.getElementById('modalTag')
    .textContent = selected.tag;

  document.getElementById('note').value =
    logs[id]?.note || '';

  renderStars();
}

function renderStars(){

  document.getElementById('stars').innerHTML =
    [1,2,3,4,5].map(n => `
      <span
        class="star ${n <= rating ? 'active' : ''}"
        onclick="setRating(${n})"
      >
        ★
      </span>
    `).join('');
}

function setRating(n){
  rating = n;
  renderStars();
}

function saveArea(){

  logs[selected.id] = {
    note:document.getElementById('note').value,
    rating
  };

  localStorage.setItem(
    today,
    JSON.stringify(logs)
  );

  document.getElementById('modal')
    .classList.remove('active');

  render();
}

window.onclick = function(e){

  if(e.target.id === 'modal'){

    document.getElementById('modal')
      .classList.remove('active');
  }
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW registered'))
      .catch(err => console.log(err));
  });
}
</script>

</body>
</html>
